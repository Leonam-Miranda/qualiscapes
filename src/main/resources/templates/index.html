<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Qualiscapes | Consulta CAPES</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">

    <style>

        body{
            font-family:'Inter',sans-serif;
            background: linear-gradient(180deg,#f8fafc,#eef2f7);
            color:#334155;
        }

        /* Navbar */

        .navbar{
            background:#0f172a;
        }

        /* Card */

        .card{
            border:none;
            border-radius:14px;
        }

        /* Badge Qualis */

        .badge-qualis{
            font-weight:700;
            font-size:0.9rem;
            padding:8px 12px;
            border-radius:8px;
        }

        .bg-a1{background:#15803d;color:white;}
        .bg-a2{background:#16a34a;color:white;}
        .bg-b1{background:#ca8a04;color:white;}

        /* tabela */

        .table thead{
            background:#f1f5f9;
            font-weight:600;
        }

        /* estado vazio */

        .empty-state{
            padding:50px;
            text-align:center;
            color:#94a3b8;
        }

        /* botão */

        .btn-primary{
            background:#2563eb;
            border:none;
            font-weight:600;
        }

        .btn-primary:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-dark shadow-sm mb-5">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🚀 QUALISCAPES
        </a>

    </div>
</nav>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card shadow-sm mb-4">

                <div class="card-body p-4">

                    <h4 class="fw-bold mb-1">Consulta de Periódicos CAPES</h4>

                    <p class="text-muted mb-4">
                        Pesquise periódicos por área de avaliação e descubra seu estrato Qualis.
                    </p>

                    <form action="/" method="get" class="row g-3">
                        <div class="col-md-7">
                            <label class="form-label fw-semibold">Área de Avaliação</label>
                            <select id="select-area" name="area" placeholder="Selecione a área...">
                                <option value="">Selecione uma Área...</option>
                                <option th:each="a : ${areas}"
                                        th:value="${a}"
                                        th:text="${a}"
                                        th:selected="${a == areaSelecionada}"></option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Classificação</label>
                            <select name="tier" class="form-select py-2">
                                <option value="">Todas as classificações</option>
                                <option th:each="t : ${tiers}"
                                        th:value="${t}"
                                        th:text="${t}"
                                        th:selected="${t == tierSelecionado}"></option>
                            </select>
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Consultar</button>
                        </div>
                    </form>

                </div>

            </div>

            <div th:if="${periodicos != null}" class="card shadow-sm">

                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">

                    <h5 class="mb-0 fw-bold">
                        Resultados da Busca
                    </h5>

                    <span
                            class="badge bg-secondary"
                            th:text="${periodicos.size() + ' periódicos encontrados'}">
</span>

                </div>

                <div class="card-body p-0">

                    <div class="table-responsive">

                        <table class="table table-hover mb-0">

                            <thead>

                            <tr>
                                <th class="ps-4">ISSN</th>
                                <th>Título do Periódico</th>
                                <th class="text-center">Estrato</th>
                            </tr>

                            </thead>

                            <tbody>

                            <tr th:each="p : ${periodicos}">

                                <td class="ps-4 text-muted" th:text="${p.issn}"></td>

                                <td class="fw-semibold" th:text="${p.title}"></td>

                                <td class="text-center">

<span
        class="badge badge-qualis shadow-sm"
        th:text="${p.tier}"
        th:classappend="${p.tier.startsWith('A') ? 'bg-a1' : (p.tier.startsWith('B') ? 'bg-b1' : 'bg-secondary')}">
</span>

                                </td>

                            </tr>

                            <tr th:if="${periodicos.empty}">

                                <td colspan="3" class="empty-state">
                                    Nenhum periódico encontrado para esta área.
                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<script>

    new TomSelect("#select-area",{
    create:false,
    sortField:{field:"text",direction:"asc"}
    });

</script>

</body>
</html>
